# GitHub Actions CI - PyPI Publication & Releases
# WARNING: Paradox is an experimental research-oriented key derivation framework
# and should not be considered a replacement for established cryptographic standards
# such as Argon2, PBKDF2, HKDF, or BLAKE3.

name: Publish Package to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build Source Distribution and Wheel
      run: python -m build

    - name: Verify package build artifacts
      run: twine check dist/*

    - name: Publish to PyPI
      uses: pypa/github-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
