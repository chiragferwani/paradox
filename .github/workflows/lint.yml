# GitHub Actions CI - Code Quality & Linting
# WARNING: Paradox is an experimental research-oriented key derivation framework
# and should not be considered a replacement for established cryptographic standards
# such as Argon2, PBKDF2, HKDF, or BLAKE3.

name: Code Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy

    - name: Run Ruff Lint
      run: ruff check .

    - name: Run Black Code Format Check
      run: black --check .

    - name: Run Mypy Type Analysis Check
      run: mypy paradox/
